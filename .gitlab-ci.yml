include:
  - project: 'emv/cicd/cicd-template'
    file: 'common-include-without-check.yml'
  - project: 'emv/cicd/cicd-template'
    file: '.[reference-script]-script-gcloud-login.yml'
  - project: 'emv/cicd/cicd-template'
    file: 'v3/.[deploy]-deploy-to-single-gce.yml'
  - project: 'emv/cicd/cicd-template'
    file: '.[reference-script]-script-gen-gce-ssh-key.yml'
  - project: 'emv/cicd/cicd-template'
    file: '.[reference-script]-script-gitlab-cicd-commit-and-push.yml'
  - project: 'emv/cicd/cicd-template'
    file: 'v3/.[release]-release-vuejs-to-project-team.yml'
  - project: 'emv/cicd/cicd-template'
    file: '.[sonarqube-check]-sonarqube-check-nodejs.yml'
  - local: '.cicd/project_deploy.yml'
  - local: '.cicd/emv_deploy.yml'

image: asia-east1-docker.pkg.dev/hitrustpay-shareconnect/hitrustpay-docker-repository/gitlabpipeline:$PIPELINE_NODEJS_IMAGE_TAG
#image: asia-east1-docker.pkg.dev/hitrustpay-shareconnect/hitrustpay-docker-repository/gitlabpipeline:gcloud528-debian-nodejs22-20250728

stages:
  - release
  - deploy
  - install
  #- test
  - check
  - sonarqube-check
  - dependency-check
  - build

cache:
  key: ${CI_COMMIT_BRANCH}
  paths:
    - node_modules/

# Install dependencies
install_dependencies:
  stage: install
  tags:
    - 'shareconnect-gke-runner-emv'
  script:
    - node -v
    - npm ci
    - npm ci

eslint-check:
  stage: check
  tags:
    - 'shareconnect-gke-runner-emv'
  script:
    - node -v
    - npm run lint

prettier-check:
  stage: check
  tags:
    - 'shareconnect-gke-runner-emv'
  script:
    - node -v
    - npm run prettier:check

.run_tests:
  stage: test
  tags:
    - 'shareconnect-gke-runner-emv'
  script:
    - npm run test

npm_audit:
  stage: dependency-check
  tags:
    - 'shareconnect-gke-runner-emv'
  script:
    - npm ci # 確保 node_modules 是乾淨安裝
    - npm audit --audit-level=high --json > npm-audit-report.json
  allow_failure: false # 有高風險以上漏洞就讓 pipeline 失敗
  artifacts:
    when: always
    paths:
      - npm-audit-report.json
    expire_in: 1 week

build_project:
  stage: build
  tags:
    - 'shareconnect-gke-runner-emv'
  script:
    - node -v
    - npm run build

sonarqube-check:
  extends: .sonarqube-check-nodejs
  stage: sonarqube-check
